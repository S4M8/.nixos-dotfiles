general {
    hide_cursor      = true
    grace            = 0
    no_fade_in       = false
    ignore_empty_input = true
}

background {
    path = ~/pictures/wallpapers/.current-blurred.jpg
	blur_passes = 0
	brightness = 0.8
}

input-field {
    size = 100, 25
    outline_thickness = 0
    dots_size = 0.3
    dots_space = 0.5
    dots_center = true
    inner_color = rgb(f5c2e7)
    font_color = rgb(10, 10, 10)
    hide_input = false
    rounding = -1
    check_color = rgb(f5c2e7)
    fail_color = rgb(255, 97, 97)
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
	fade_on_empty = false
}

label {
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgb(f5c2e7)
    font_size = 100
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
}
